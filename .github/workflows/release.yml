name: Release Binary Skill

on:
  push:
    tags: ["*@*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-macos
            rust_target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-linux
            rust_target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-windows
            rust_target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Parse tag
        shell: bash
        run: |
          SKILL_NAME="${GITHUB_REF_NAME%@*}"
          SKILL_VERSION="${GITHUB_REF_NAME#*@}"
          echo "SKILL_NAME=$SKILL_NAME" >> "$GITHUB_ENV"
          echo "SKILL_VERSION=$SKILL_VERSION" >> "$GITHUB_ENV"
          echo "Releasing $SKILL_NAME @ $SKILL_VERSION for ${{ matrix.target }}"

      - name: Build
        shell: bash
        run: |
          cargo build --release -p "$SKILL_NAME" --target ${{ matrix.rust_target }}

      - name: Generate artifact.json
        shell: bash
        run: |
          cat > "skills/$SKILL_NAME/artifact.json" << ARTIFACT
          {"kind":"skill_binary","id":"$SKILL_NAME","version":"$SKILL_VERSION","entry_binary":"$SKILL_NAME","target":"${{ matrix.target }}","download":{"repo":"lhwzds/restflow-skills","tag":"$GITHUB_REF_NAME","asset":"$SKILL_NAME-${{ matrix.target }}.tar.gz"}}
          ARTIFACT

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p /tmp/package
          cp "target/${{ matrix.rust_target }}/release/$SKILL_NAME" /tmp/package/
          cp "skills/$SKILL_NAME/SKILL.md" /tmp/package/
          cp "skills/$SKILL_NAME/artifact.json" /tmp/package/
          cd /tmp/package
          tar czf "/tmp/$SKILL_NAME-${{ matrix.target }}.tar.gz" "$SKILL_NAME" SKILL.md artifact.json
          echo "ASSET=/tmp/$SKILL_NAME-${{ matrix.target }}.tar.gz" >> "$GITHUB_ENV"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir -p C:\temp\package
          cp "target\${{ matrix.rust_target }}\release\$env:SKILL_NAME.exe" C:\temp\package\
          cp "skills\$env:SKILL_NAME\SKILL.md" C:\temp\package\
          cp "skills\$env:SKILL_NAME\artifact.json" C:\temp\package\
          Compress-Archive -Path "C:\temp\package\$env:SKILL_NAME.exe","C:\temp\package\SKILL.md","C:\temp\package\artifact.json" -DestinationPath "C:\temp\$env:SKILL_NAME-${{ matrix.target }}.zip"
          echo "ASSET=C:\temp\$env:SKILL_NAME-${{ matrix.target }}.zip" >> $env:GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ env.SKILL_NAME }} ${{ env.SKILL_VERSION }}"
          files: ${{ env.ASSET }}
          body: |
            ## ${{ env.SKILL_NAME }} ${{ env.SKILL_VERSION }}

            ### Platforms
            | Platform | Asset |
            |----------|-------|
            | macOS (Apple Silicon) | `${{ env.SKILL_NAME }}-aarch64-macos.tar.gz` |
            | Linux (x86_64) | `${{ env.SKILL_NAME }}-x86_64-linux.tar.gz` |
            | Windows (x86_64) | `${{ env.SKILL_NAME }}-x86_64-windows.zip` |

            ### Install (macOS / Linux)
            ```bash
            mkdir -p ~/.restflow/skills/${{ env.SKILL_NAME }}
            curl -L https://github.com/lhwzds/restflow-skills/releases/download/${{ github.ref_name }}/${{ env.SKILL_NAME }}-aarch64-macos.tar.gz | tar xz -C ~/.restflow/skills/${{ env.SKILL_NAME }}
            chmod +x ~/.restflow/skills/${{ env.SKILL_NAME }}/${{ env.SKILL_NAME }}
            ```

            ### Install (Windows)
            ```powershell
            mkdir ~/.restflow/skills/${{ env.SKILL_NAME }} -Force
            Invoke-WebRequest -Uri "https://github.com/lhwzds/restflow-skills/releases/download/${{ github.ref_name }}/${{ env.SKILL_NAME }}-x86_64-windows.zip" -OutFile "${{ env.SKILL_NAME }}.zip"
            Expand-Archive ${{ env.SKILL_NAME }}.zip -DestinationPath ~/.restflow/skills/${{ env.SKILL_NAME }}
            ```

            ### What's inside
            Each archive contains:
            - `${{ env.SKILL_NAME }}` — the binary
            - `SKILL.md` — documentation and usage
            - `artifact.json` — metadata for tooling

            ### Quick test
            ```bash
            echo '{"action":"status"}' | ./${{ env.SKILL_NAME }}
            ```
