name: Release Binary Skill

on:
  push:
    tags: ["*@*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-macos
            rust_target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-linux
            rust_target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-windows
            rust_target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Parse tag
        shell: bash
        run: |
          SKILL_NAME="${GITHUB_REF_NAME%@*}"
          SKILL_VERSION="${GITHUB_REF_NAME#*@}"
          echo "SKILL_NAME=$SKILL_NAME" >> "$GITHUB_ENV"
          echo "SKILL_VERSION=$SKILL_VERSION" >> "$GITHUB_ENV"
          echo "Releasing $SKILL_NAME @ $SKILL_VERSION for ${{ matrix.target }}"

      - name: Build
        shell: bash
        run: |
          cargo build --release -p "$SKILL_NAME" --target ${{ matrix.rust_target }}

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.rust_target }}/release
          tar czf /tmp/${SKILL_NAME}-${{ matrix.target }}.tar.gz ${SKILL_NAME}
          echo "ASSET=/tmp/${SKILL_NAME}-${{ matrix.target }}.tar.gz" >> "$GITHUB_ENV"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.rust_target }}/release
          7z a /tmp/${SKILL_NAME}-${{ matrix.target }}.zip ${SKILL_NAME}.exe
          echo "ASSET=/tmp/${SKILL_NAME}-${{ matrix.target }}.zip" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ env.SKILL_NAME }} ${{ env.SKILL_VERSION }}"
          files: ${{ env.ASSET }}
          body: |
            ## ${{ env.SKILL_NAME }} ${{ env.SKILL_VERSION }}

            **Platforms:**
            - `aarch64-macos` (Apple Silicon)
            - `x86_64-linux`
            - `x86_64-windows`

            **Install:**
            ```bash
            # Download and extract
            curl -L https://github.com/lhwzds/restflow-skills/releases/download/${{ github.ref_name }}/${{ env.SKILL_NAME }}-aarch64-macos.tar.gz | tar xz
            chmod +x ${{ env.SKILL_NAME }}
            mv ${{ env.SKILL_NAME }} ~/.restflow/skills/${{ env.SKILL_NAME }}/bin/
            ```
